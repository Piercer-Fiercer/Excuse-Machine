<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form 000 — Petition for Approval</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #E8DFC8;
    --paper-dark: #D9CBA3;
    --ink: #1F2D3D;
    --stamp-red: #B23A2E;
    --stamp-teal: #3D6B63;
    --shadow: rgba(31,45,61,0.25);
  }

  * { box-sizing: border-box; }

  .bureau-return {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 50;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--stamp-teal);
    color: var(--paper);
    text-decoration: none;
    font-family: 'Courier Prime', monospace;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 12px;
    border-radius: 3px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: transform 0.1s ease, opacity 0.1s ease;
  }

  .bureau-return:hover,
  .bureau-return:focus-visible {
    transform: translateY(-1px);
    opacity: 0.92;
  }

  .bureau-return:focus-visible {
    outline: 2px solid var(--paper);
    outline-offset: 2px;
  }

  @media (max-width: 480px) {
    .bureau-return {
      top: 10px;
      left: 10px;
      font-size: 9px;
      padding: 7px 10px;
    }
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: #4a4536;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.03) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(0,0,0,0.15) 0%, transparent 50%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: 'Courier Prime', monospace;
  }

  .form-card {
    position: relative;
    width: 100%;
    max-width: 520px;
    background: var(--paper);
    background-image:
      repeating-linear-gradient(0deg, rgba(31,45,61,0.02) 0px, transparent 1px, transparent 2px),
      radial-gradient(ellipse at top left, rgba(255,255,255,0.15), transparent 60%);
    border: 2px solid var(--ink);
    box-shadow: 0 20px 50px var(--shadow), inset 0 0 0 6px var(--paper-dark), inset 0 0 0 7px var(--ink);
    padding: 34px 30px 30px;
  }

  .form-card::before {
    content: "";
    position: absolute;
    inset: 12px;
    border: 1px dashed rgba(31,45,61,0.35);
    pointer-events: none;
  }

  .letterhead {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 12px;
    margin-bottom: 18px;
  }

  .letterhead .agency {
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink);
    line-height: 1.5;
  }

  .letterhead .agency span {
    display: block;
    font-weight: 400;
    font-size: 9px;
    opacity: 0.65;
  }

  .form-number {
    font-size: 10px;
    text-align: right;
    color: var(--ink);
    opacity: 0.7;
    line-height: 1.5;
  }

  h1 {
    font-family: 'Special Elite', cursive;
    font-size: 22px;
    text-align: center;
    color: var(--ink);
    margin: 0 0 4px;
  }

  .subhead {
    text-align: center;
    font-size: 11px;
    color: var(--ink);
    opacity: 0.7;
    margin-bottom: 22px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink);
    margin-bottom: 6px;
  }

  select {
    width: 100%;
    font-family: 'Courier Prime', monospace;
    font-size: 14px;
    padding: 8px 10px;
    background: rgba(255,255,255,0.5);
    border: none;
    border-bottom: 2px solid var(--ink);
    color: var(--ink);
    appearance: none;
    cursor: pointer;
  }

  select:focus-visible {
    outline: 3px solid var(--stamp-teal);
    outline-offset: 2px;
  }

  .checkbox-field {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 12px;
    line-height: 1.5;
    margin-bottom: 22px;
  }

  .checkbox-field input {
    margin-top: 3px;
    accent-color: var(--stamp-teal);
    width: 15px;
    height: 15px;
    flex-shrink: 0;
  }

  .submit-btn {
    display: block;
    width: 100%;
    font-family: 'Courier Prime', monospace;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--paper);
    background: var(--ink);
    border: none;
    border-radius: 4px;
    padding: 14px 20px;
    cursor: pointer;
    box-shadow: 0 6px 0 #0c1319, 0 8px 14px rgba(0,0,0,0.3);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }

  .submit-btn:active {
    transform: translateY(6px);
    box-shadow: 0 0 0 #0c1319, 0 2px 6px rgba(0,0,0,0.3);
  }

  .submit-btn:focus-visible {
    outline: 3px solid var(--stamp-teal);
    outline-offset: 3px;
  }

  .result-area {
    margin-top: 24px;
    min-height: 170px;
    border: 1px solid rgba(31,45,61,0.4);
    background: rgba(255,255,255,0.35);
    padding: 20px;
    text-align: center;
    position: relative;
  }

  .result-placeholder {
    font-size: 12px;
    opacity: 0.5;
    font-style: italic;
    padding-top: 50px;
  }

  .verdict-stamp {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 130px;
    height: 130px;
    border: 5px solid var(--stamp-red);
    border-radius: 50%;
    color: var(--stamp-red);
    font-family: 'Special Elite', cursive;
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    transform: rotate(-10deg) scale(0);
    opacity: 0;
    mix-blend-mode: multiply;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.25s ease, color 0.25s ease;
  }

  .verdict-stamp.slam {
    animation: slam 0.4s cubic-bezier(0.3, 1.3, 0.4, 1) forwards;
  }

  .verdict-stamp.approved {
    border-color: var(--stamp-teal);
    color: var(--stamp-teal);
    cursor: default;
  }

  @keyframes slam {
    0%   { transform: rotate(-10deg) scale(2.2); opacity: 0; }
    55%  { transform: rotate(-10deg) scale(0.9); opacity: 0.9; }
    75%  { transform: rotate(-10deg) scale(1.05); opacity: 0.85; }
    100% { transform: rotate(-10deg) scale(1); opacity: 0.85; }
  }

  .verdict-reason {
    margin-top: 14px;
    font-family: 'Special Elite', cursive;
    font-size: 13px;
    color: var(--ink);
    line-height: 1.6;
  }

  .verdict-hint {
    margin-top: 12px;
    font-size: 10px;
    color: var(--ink);
    opacity: 0.5;
    font-style: italic;
  }

  .approved-text {
    margin-top: 14px;
    font-family: 'Special Elite', cursive;
    font-size: 13px;
    color: var(--ink);
    line-height: 1.6;
  }

  .reset-btn {
    display: none;
    margin: 18px auto 0;
    font-family: 'Courier Prime', monospace;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    background: transparent;
    border: 2px solid var(--ink);
    border-radius: 4px;
    padding: 10px 18px;
    cursor: pointer;
  }

  .reset-btn.show { display: inline-block; }

  .reset-btn:hover { background: var(--ink); color: var(--paper); }

  .footer-note {
    margin-top: 20px;
    font-size: 9px;
    text-align: center;
    color: var(--ink);
    opacity: 0.55;
    letter-spacing: 0.05em;
  }

  @media (prefers-reduced-motion: reduce) {
    .verdict-stamp.slam { animation: none; opacity: 0.85; transform: rotate(-10deg) scale(1); }
  }

  @media (max-width: 480px) {
    .form-card { padding: 26px 20px 24px; }
    h1 { font-size: 19px; }
  }
</style>
</head>
<body>

<a class="bureau-return" href="index.html">← The Bureau</a>

<div class="form-card">
  <div class="letterhead">
    <div class="agency">Bureau of Plausible Deniability<span>Office of Petitions</span></div>
    <div class="form-number">FORM 000<br>PETITION</div>
  </div>

  <h1>Petition for Approval</h1>
  <div class="subhead">Complete the form below to request formal approval</div>

  <div class="field">
    <label for="reason">Reason for Request</label>
    <select id="reason">
      <option>Personal</option>
      <option>Professional</option>
      <option>Metaphysical</option>
      <option>Unspecified</option>
    </select>
  </div>

  <div class="field">
    <label for="urgency">Urgency</label>
    <select id="urgency">
      <option>Low</option>
      <option>Moderate</option>
      <option>High</option>
      <option>Existential</option>
    </select>
  </div>

  <div class="checkbox-field">
    <input type="checkbox" id="oath" />
    <label for="oath">I solemnly swear that this request is legitimate and made in good faith.</label>
  </div>

  <button class="submit-btn" id="submitBtn">Submit for Review</button>

  <div class="result-area" id="resultArea">
    <div class="result-placeholder" id="placeholder">Awaiting submission.</div>
  </div>

  <button class="reset-btn" id="resetBtn">File a New Petition</button>

  <div class="footer-note">Approval, once granted, cannot be meaningfully revoked.</div>
</div>

<script>
  const reasons = [
    "Request filed in an insufficiently confident tone.",
    "Form completed during an inauspicious hour of the day.",
    "Reason for request exceeds current bureaucratic comprehension.",
    "Signature style deemed overly casual for the matter at hand.",
    "Petition submitted one (1) day after the deadline that was never announced.",
    "Urgency level does not match the energy of the room.",
    "This request has been filed correctly, which is itself suspicious.",
    "Checkbox ticked with insufficient conviction.",
    "The Bureau is not currently accepting requests of this general shape.",
    "Petition lacks a compelling reason to be denied, which is being treated as one."
  ];

  const submitBtn = document.getElementById('submitBtn');
  const resultArea = document.getElementById('resultArea');
  const resetBtn = document.getElementById('resetBtn');

  let submitCount = 0;
  let approved = false;

  function randomReason() {
    return reasons[Math.floor(Math.random() * reasons.length)];
  }

  function renderRejection() {
    submitCount++;

    resultArea.innerHTML = '';

    const stamp = document.createElement('div');
    stamp.className = 'verdict-stamp';
    stamp.innerHTML = 'Rejected';
    stamp.setAttribute('role', 'button');
    stamp.setAttribute('tabindex', '0');
    stamp.setAttribute('aria-label', 'Rejected stamp. Activate to appeal.');

    const reasonEl = document.createElement('div');
    reasonEl.className = 'verdict-reason';
    reasonEl.textContent = randomReason();

    resultArea.appendChild(stamp);
    resultArea.appendChild(reasonEl);

    if (submitCount >= 3) {
      const hint = document.createElement('div');
      hint.className = 'verdict-hint';
      hint.textContent = '(Some say the stamp itself can be persuaded.)';
      resultArea.appendChild(hint);
    }

    void stamp.offsetWidth;
    stamp.classList.add('slam');

    const activate = () => approveStamp(stamp);
    stamp.addEventListener('click', activate);
    stamp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        activate();
      }
    });
  }

  function approveStamp(stamp) {
    if (approved) return;
    approved = true;

    stamp.textContent = 'Approved';
    stamp.classList.add('approved');
    stamp.setAttribute('aria-label', 'Approved stamp.');

    const approvedText = document.createElement('div');
    approvedText.className = 'approved-text';
    approvedText.textContent = 'Turns out the form was never the point. You just had to stop asking permission.';
    resultArea.appendChild(approvedText);

    submitBtn.disabled = true;
    submitBtn.style.opacity = '0.5';
    submitBtn.style.cursor = 'default';
    resetBtn.classList.add('show');
  }

  function resetPuzzle() {
    submitCount = 0;
    approved = false;
    submitBtn.disabled = false;
    submitBtn.style.opacity = '1';
    submitBtn.style.cursor = 'pointer';
    resetBtn.classList.remove('show');
    resultArea.innerHTML = '<div class="result-placeholder" id="placeholder">Awaiting submission.</div>';
  }

  submitBtn.addEventListener('click', () => {
    if (approved) return;
    renderRejection();
  });

  resetBtn.addEventListener('click', resetPuzzle);
</script>

</body>
</html>
