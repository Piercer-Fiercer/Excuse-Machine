<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Appointment — A Bureau Case File</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #E8DFC8;
    --paper-dark: #D9CBA3;
    --ink: #1F2D3D;
    --stamp-red: #B23A2E;
    --stamp-teal: #3D6B63;
    --shadow: rgba(31,45,61,0.25);
  }

  * { box-sizing: border-box; }

  .bureau-return {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 50;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--stamp-teal);
    color: var(--paper);
    text-decoration: none;
    font-family: 'Courier Prime', monospace;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 12px;
    border-radius: 3px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: transform 0.1s ease, opacity 0.1s ease;
  }

  .bureau-return:hover,
  .bureau-return:focus-visible {
    transform: translateY(-1px);
    opacity: 0.92;
  }

  .bureau-return:focus-visible {
    outline: 2px solid var(--paper);
    outline-offset: 2px;
  }

  @media (max-width: 480px) {
    .bureau-return {
      top: 10px;
      left: 10px;
      font-size: 9px;
      padding: 7px 10px;
    }
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: #4a4536;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.03) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(0,0,0,0.15) 0%, transparent 50%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: 'Courier Prime', monospace;
  }

  .case-file {
    position: relative;
    width: 100%;
    max-width: 560px;
    background: var(--paper);
    background-image:
      repeating-linear-gradient(0deg, rgba(31,45,61,0.02) 0px, transparent 1px, transparent 2px),
      radial-gradient(ellipse at top left, rgba(255,255,255,0.15), transparent 60%);
    border: 2px solid var(--ink);
    box-shadow: 0 20px 50px var(--shadow), inset 0 0 0 6px var(--paper-dark), inset 0 0 0 7px var(--ink);
    padding: 36px 32px 32px;
  }

  .case-file::before {
    content: "";
    position: absolute;
    inset: 12px;
    border: 1px dashed rgba(31,45,61,0.35);
    pointer-events: none;
  }

  .letterhead {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 12px;
    margin-bottom: 20px;
  }

  .letterhead .agency {
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink);
    line-height: 1.5;
  }

  .letterhead .agency span {
    display: block;
    font-weight: 400;
    font-size: 9px;
    opacity: 0.65;
  }

  .case-number {
    font-size: 10px;
    text-align: right;
    color: var(--ink);
    opacity: 0.7;
    line-height: 1.5;
  }

  h1 {
    font-family: 'Special Elite', cursive;
    font-size: 24px;
    text-align: center;
    color: var(--ink);
    margin: 0 0 4px;
    letter-spacing: 0.02em;
  }

  .subhead {
    text-align: center;
    font-size: 11px;
    color: var(--ink);
    opacity: 0.7;
    margin-bottom: 24px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .progress {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 22px;
  }

  .progress .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(31,45,61,0.2);
    transition: background 0.2s ease;
  }

  .progress .dot.filled { background: var(--stamp-teal); }

  .scene-text {
    min-height: 90px;
    border: 1px solid rgba(31,45,61,0.4);
    background: rgba(255,255,255,0.35);
    padding: 16px;
    margin-bottom: 22px;
    font-family: 'Special Elite', cursive;
    font-size: 15px;
    line-height: 1.7;
    color: var(--ink);
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .choice-btn {
    font-family: 'Courier Prime', monospace;
    font-weight: 700;
    font-size: 13px;
    text-align: left;
    color: var(--ink);
    background: rgba(255,255,255,0.5);
    border: 2px solid var(--ink);
    border-radius: 4px;
    padding: 14px 16px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.08s ease;
  }

  .choice-btn:hover { background: var(--paper-dark); }
  .choice-btn:active { transform: translateY(2px); }

  .choice-btn:focus-visible {
    outline: 3px solid var(--stamp-teal);
    outline-offset: 2px;
  }

  .ending-stamp-wrap {
    display: flex;
    justify-content: center;
    margin: 10px 0 22px;
  }

  .ending-stamp {
    width: 140px;
    height: 140px;
    border: 5px solid var(--stamp-red);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--stamp-red);
    font-family: 'Special Elite', cursive;
    font-size: 15px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    text-align: center;
    transform: rotate(-14deg) scale(0);
    opacity: 0;
    mix-blend-mode: multiply;
    line-height: 1.3;
    padding: 10px;
  }

  .ending-stamp.slam {
    animation: slam 0.5s cubic-bezier(0.2, 1.4, 0.4, 1) forwards;
  }

  @keyframes slam {
    0%   { transform: rotate(-14deg) scale(2.6); opacity: 0; }
    55%  { transform: rotate(-14deg) scale(0.9); opacity: 0.9; }
    75%  { transform: rotate(-14deg) scale(1.06); opacity: 0.85; }
    100% { transform: rotate(-14deg) scale(1); opacity: 0.85; }
  }

  .restart-btn {
    display: block;
    width: 100%;
    font-family: 'Courier Prime', monospace;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--paper);
    background: var(--stamp-red);
    border: none;
    border-radius: 4px;
    padding: 14px 20px;
    cursor: pointer;
    box-shadow: 0 6px 0 #7a241c, 0 8px 14px rgba(0,0,0,0.3);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }

  .restart-btn:active {
    transform: translateY(6px);
    box-shadow: 0 0 0 #7a241c, 0 2px 6px rgba(0,0,0,0.3);
  }

  .restart-btn:focus-visible {
    outline: 3px solid var(--stamp-teal);
    outline-offset: 3px;
  }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 18px;
    font-size: 10px;
    color: var(--ink);
    opacity: 0.6;
    text-decoration: underline;
  }

  .footer-note {
    margin-top: 22px;
    font-size: 9px;
    text-align: center;
    color: var(--ink);
    opacity: 0.55;
    letter-spacing: 0.05em;
  }

  @media (prefers-reduced-motion: reduce) {
    .ending-stamp.slam { animation: none; opacity: 0.85; transform: rotate(-14deg) scale(1); }
  }

  @media (max-width: 480px) {
    .case-file { padding: 28px 20px 24px; }
    h1 { font-size: 20px; }
  }
</style>
</head>
<body>

<a class="bureau-return" href="index.html">← The Bureau</a>

<div class="case-file">
  <div class="letterhead">
    <div class="agency">Bureau of Plausible Deniability<span>Case Processing Division</span></div>
    <div class="case-number" id="caseNumber">CASE 004-A</div>
  </div>

  <h1>The Appointment</h1>
  <div class="subhead">Interactive Case File — Choose Your Path</div>

  <div class="progress" id="progress" aria-hidden="true">
    <div class="dot filled" id="dot1"></div>
    <div class="dot" id="dot2"></div>
    <div class="dot" id="dot3"></div>
  </div>

  <div class="scene-text" id="sceneText" aria-live="polite"></div>

  <div class="choices" id="choices"></div>

  <div class="ending-stamp-wrap" id="stampWrap" style="display:none;">
    <div class="ending-stamp" id="endingStamp"></div>
  </div>

  <button class="restart-btn" id="restartBtn" style="display:none;">File a New Case</button>

  <div class="footer-note">All outcomes are final and legally meaningless.</div>
</div>

<script>
  const scenes = {
    start: {
      text: "You arrive at The Bureau to renew a form you didn't know had an expiration date. The waiting room hums with fluorescent light. A sign reads: TAKE A NUMBER, or DON'T.",
      choices: [
        { label: "Take a number and wait like a civilized person", next: "waitingRoom" },
        { label: "Walk directly up to the front desk", next: "frontDesk" }
      ]
    },
    waitingRoom: {
      text: "Your number is called sometime between now and the heat death of the universe. A stranger beside you has clearly been here longer than you've been alive. They offer you a pamphlet titled 'So You've Also Been Waiting.'",
      choices: [
        { label: "Strike up a conversation with the stranger", next: "endSociety" },
        { label: "Read the pamphlet instead", next: "endTransferred" }
      ]
    },
    frontDesk: {
      text: "The clerk looks up slowly, unimpressed by your audacity. 'We don't do walk-ins,' they say, 'we do walk-arounds. Please walk around and come back.'",
      choices: [
        { label: "Apologize profusely and comply", next: "endCertified" },
        { label: "Stand your ground and demand service", next: "endBanned" }
      ]
    },
    endSociety: {
      title: "You have been inducted into the Waiting Room Society, a lifelong fellowship of people who arrived before you and will likely leave after you. Membership includes a laminated card and zero benefits.",
      stamp: "Society<br>Member",
    },
    endTransferred: {
      title: "The pamphlet reveals, in very small print, that you have been waiting in the wrong building entirely. Your case has been quietly transferred three towns over, where it will begin waiting all over again.",
      stamp: "Case<br>Transferred",
    },
    endCertified: {
      title: "Your apology is accepted with unexpected warmth. The clerk hands you a 'Certificate of Politeness' and, mysteriously, your original form is renewed without you ever filling anything out.",
      stamp: "Politeness<br>Certified",
    },
    endBanned: {
      title: "Security arrives with the calm efficiency of people who have done this many, many times before. You are escorted out and formally banned from all Bureau premises, effective immediately and eternally.",
      stamp: "Banned<br>Indefinitely",
    }
  };

  const sceneTextEl = document.getElementById('sceneText');
  const choicesEl = document.getElementById('choices');
  const stampWrap = document.getElementById('stampWrap');
  const endingStamp = document.getElementById('endingStamp');
  const restartBtn = document.getElementById('restartBtn');
  const caseNumberEl = document.getElementById('caseNumber');
  const dots = [document.getElementById('dot1'), document.getElementById('dot2'), document.getElementById('dot3')];

  function setProgress(step) {
    dots.forEach((dot, i) => {
      dot.classList.toggle('filled', i < step);
    });
  }

  function isEnding(sceneKey) {
    return !!scenes[sceneKey].stamp;
  }

  function renderScene(sceneKey, step) {
    const scene = scenes[sceneKey];
    setProgress(step);

    if (isEnding(sceneKey)) {
      sceneTextEl.textContent = scene.title;
      choicesEl.innerHTML = '';
      stampWrap.style.display = 'flex';
      restartBtn.style.display = 'block';

      endingStamp.classList.remove('slam');
      endingStamp.innerHTML = scene.stamp;
      void endingStamp.offsetWidth;
      endingStamp.classList.add('slam');
      return;
    }

    stampWrap.style.display = 'none';
    restartBtn.style.display = 'none';
    sceneTextEl.textContent = scene.text;

    choicesEl.innerHTML = '';
    scene.choices.forEach(choice => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice.label;
      btn.addEventListener('click', () => renderScene(choice.next, step + 1));
      choicesEl.appendChild(btn);
    });
  }

  function randomCaseNumber() {
    const num = Math.floor(100 + Math.random() * 899);
    const letter = String.fromCharCode(65 + Math.floor(Math.random() * 26));
    return `CASE ${num}-${letter}`;
  }

  restartBtn.addEventListener('click', () => {
    caseNumberEl.textContent = randomCaseNumber();
    renderScene('start', 1);
  });

  renderScene('start', 1);
</script>

</body>
</html>
